#cloud-config
package_update: true
package_upgrade: true

packages:
  - docker.io
  - docker-compose
  - python3
  - python3-pip
  - python3-venv
  - nodejs
  - npm
  - git
  - curl
  - wget
  - htop
  - jq
  - unzip
  - ufw

runcmd:
  # Docker
  - systemctl enable docker
  - systemctl start docker

  # Firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw --force enable

  # Create agent workspace
  - mkdir -p /home/agent/projects
  - mkdir -p /home/agent/downloads
  - mkdir -p /home/agent/workspace
  - mkdir -p /home/agent/.config

  # Welcome file
  - |
    cat > /home/agent/README.md << 'EOF'
    # 🏆 S-Rank Agent Server
    Your AI-powered cloud PC is ready.
    
    ## Directories
    - /home/agent/projects — Your projects
    - /home/agent/downloads — Downloaded files
    - /home/agent/workspace — Agent workspace
    EOF

  # Install global Node.js tools
  - npm install -g pnpm typescript ts-node

  # Install Python tools
  - pip3 install --break-system-packages pandas numpy requests beautifulsoup4

  # Set permissions
  - chown -R 1000:1000 /home/agent

  # Signal ready
  - echo "SRANK_READY" > /tmp/srank-status
